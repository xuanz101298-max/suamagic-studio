<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuaMagic Studio - Future Art Laboratory</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #F5A623;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .selection-white::selection {
            background-color: #fff;
            color: #000;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }
        /* Carousel Styles */
        .carousel-container {
            perspective: 1000px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }
        .artist-card {
            position: absolute;
            width: 220px;
            height: 260px;
            border-radius: 1rem;
            background: #111;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .artist-card.active {
            border-color: rgba(255,255,255,0.2);
        }
        .artist-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        /* Edit Overlay */
        .edit-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 20;
        }
        .artist-card:hover .edit-overlay {
            opacity: 1;
        }
        /* Editable Field */
        .editable-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            width: 100%;
            padding: 2px 0;
        }
        .editable-input:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body class="selection-white">

    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-[100] transition-all duration-500 py-8 px-6 md:px-12 bg-black/0">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div id="logo-container" class="h-8 md:h-10 flex items-center">
                    <!-- Logo will be injected here -->
                    <span class="font-bold text-xl tracking-tighter uppercase text-white">SuaMagic Studio</span>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-12">
                <a href="#about" class="text-[10px] font-mono uppercase tracking-[0.3em] text-white/50 hover:text-white transition-colors">About</a>
                <a href="#showcase" class="text-[10px] font-mono uppercase tracking-[0.3em] text-white/50 hover:text-white transition-colors">Showcase</a>
                <a href="#artists" class="text-[10px] font-mono uppercase tracking-[0.3em] text-white/50 hover:text-white transition-colors">Artists</a>
            </div>

            <div class="flex items-center gap-6">
                <button id="auth-btn" class="text-[10px] font-mono uppercase tracking-[0.3em] text-white/50 hover:text-white transition-colors">Login</button>
                <div id="edit-toggle-container" class="hidden">
                    <button id="edit-toggle" class="px-4 py-1.5 rounded-full border border-white/20 text-[10px] font-mono uppercase tracking-widest hover:bg-white hover:text-black transition-all">Edit Mode</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="h-screen flex flex-col items-center justify-center relative overflow-hidden bg-black">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/40 to-black z-10"></div>
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" class="w-full h-full object-cover opacity-40" alt="Hero Background">
        </div>
        
        <div class="relative z-20 text-center px-6">
            <h1 class="text-6xl md:text-9xl font-bold tracking-tighter uppercase mb-6 leading-[0.9]">
                SuaMagic<br/><span class="text-transparent" style="-webkit-text-stroke: 1px white;">Studio</span>
            </h1>
            <p class="text-[10px] md:text-xs font-mono uppercase tracking-[0.5em] text-white/50 max-w-md mx-auto leading-loose">
                Future Art Laboratory / Multimodal AI Cinema / DAO Ecosystem
            </p>
        </div>

        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-4 animate-bounce">
            <span class="text-[8px] font-mono uppercase tracking-[0.3em] text-white/30">Scroll</span>
            <div class="w-[1px] h-12 bg-gradient-to-b from-white/50 to-transparent"></div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about-section" class="py-40 px-6 md:px-12 max-w-5xl mx-auto bg-black text-white border-t border-white/10">
        <div id="about-container" class="flex flex-col gap-32">
            <!-- About items will be injected here -->
        </div>
    </section>

    <!-- Showcase Section -->
    <section id="showcase" class="py-24 px-6 md:px-12 max-w-7xl mx-auto bg-black border-t border-white/10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-8">
            <div>
                <h2 class="text-[#F5A623] font-mono text-[10px] tracking-[0.2em] uppercase mb-4 font-bold">Selected Works</h2>
                <h3 class="text-3xl md:text-4xl font-bold tracking-tighter uppercase text-white">Showcase</h3>
                
                <div id="filter-container" class="flex flex-wrap gap-4 mt-8">
                    <button data-filter="ALL" class="filter-btn text-[10px] font-mono uppercase tracking-widest px-4 py-1 border transition-all bg-[#F5A623] border-[#F5A623] text-black">ALL</button>
                    <button data-filter="FILM" class="filter-btn text-[10px] font-mono uppercase tracking-widest px-4 py-1 border border-white/20 text-white/50 hover:border-white/50 transition-all">FILM</button>
                    <button data-filter="COMMERCIAL" class="filter-btn text-[10px] font-mono uppercase tracking-widest px-4 py-1 border border-white/20 text-white/50 hover:border-white/50 transition-all">COMMERCIAL</button>
                    <button data-filter="CONCEPT" class="filter-btn text-[10px] font-mono uppercase tracking-widest px-4 py-1 border border-white/20 text-white/50 hover:border-white/50 transition-all">CONCEPT</button>
                </div>
            </div>
            <div id="add-work-container" class="hidden">
                <button id="add-work-btn" class="flex items-center gap-2 text-xs font-mono bg-white/10 text-white hover:bg-white/20 px-4 py-2 rounded-full transition-colors uppercase tracking-widest">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Project
                </button>
            </div>
        </div>

        <div id="works-grid" class="grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-16 border-t border-dotted border-white/30 pt-12">
            <!-- Works will be injected here -->
        </div>
    </section>

    <!-- Artists Section -->
    <section id="artists" class="py-32 overflow-hidden relative bg-black border-t border-white/10">
        <div id="artist-bg-blur" class="absolute inset-0 z-0 pointer-events-none overflow-hidden flex items-center justify-center opacity-15">
            <!-- Background blur will be injected here -->
        </div>

        <div class="max-w-7xl mx-auto px-6 md:px-12 mb-12 flex justify-between items-end relative z-10">
            <div>
                <h2 class="text-[#F5A623] font-mono text-[10px] tracking-[0.2em] uppercase mb-4 font-bold">The ideal state of future art</h2>
                <h3 class="text-3xl md:text-4xl font-bold tracking-tighter uppercase text-white">Signed Artists</h3>
            </div>
            <div id="add-artist-container" class="hidden">
                <button id="add-artist-btn" class="flex items-center gap-2 text-xs font-mono bg-white/10 text-white hover:bg-white/20 px-4 py-2 rounded-full transition-colors uppercase tracking-widest">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Artist
                </button>
            </div>
        </div>

        <div id="carousel-container" class="carousel-container z-10">
            <!-- Artist cards will be injected here -->
        </div>

        <div id="active-artist-info" class="relative z-10 max-w-4xl mx-auto text-center mt-12 px-6">
            <!-- Active artist info will be injected here -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-16 border-t border-white/10 text-center flex flex-col items-center justify-center gap-4 bg-black">
        <div id="footer-logo">
            <span class="font-bold text-xl tracking-tighter uppercase text-white opacity-50">SuaMagic Studio</span>
        </div>
        <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase mt-4">
            © 2024 Future Art Laboratory. All rights reserved.
        </p>
    </footer>

    <!-- Media Modal -->
    <div id="media-modal" class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/95 p-4 md:p-12 backdrop-blur-md">
        <button id="close-modal" class="absolute top-6 right-6 text-white hover:text-[#F5A623] transition-colors z-[210]">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <div id="modal-content" class="relative w-full max-w-6xl max-h-full flex flex-col items-center justify-center bg-black border border-white/10 p-4 shadow-2xl">
            <!-- Modal content will be injected here -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "gen-lang-client-0688961403",
            appId: "1:1036477856380:web:a447f1810593cd8f40a7f9",
            apiKey: "AIzaSyBapSj8t6k3egc_wQL-U4PYMjvXFXuo2tI",
            authDomain: "gen-lang-client-0688961403.firebaseapp.com",
            storageBucket: "gen-lang-client-0688961403.firebasestorage.app",
            messagingSenderId: "1036477856380"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-cdef5904-4b9a-4d88-8e69-995900aeb68e");
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // State
        let state = {
            user: null,
            isAdmin: false,
            isEditMode: false,
            works: [],
            artists: [],
            about: [],
            activeArtistIndex: 0,
            filter: 'ALL'
        };

        // UI Elements
        const authBtn = document.getElementById('auth-btn');
        const editToggleContainer = document.getElementById('edit-toggle-container');
        const editToggle = document.getElementById('edit-toggle');
        const worksGrid = document.getElementById('works-grid');
        const aboutContainer = document.getElementById('about-container');
        const carouselContainer = document.getElementById('carousel-container');
        const activeArtistInfo = document.getElementById('active-artist-info');
        const mediaModal = document.getElementById('media-modal');
        const modalContent = document.getElementById('modal-content');
        const closeModal = document.getElementById('close-modal');
        const addWorkContainer = document.getElementById('add-work-container');
        const addArtistContainer = document.getElementById('add-artist-container');

        // Auth Logic
        authBtn.onclick = async () => {
            if (state.user) {
                await signOut(auth);
            } else {
                await signInWithPopup(auth, provider);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.user = user;
            if (user) {
                authBtn.innerText = 'Logout';
                // Check Admin
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    state.isAdmin = true;
                } else if (user.email === 'xuanz101298@gmail.com') {
                    state.isAdmin = true;
                    await setDoc(doc(db, 'users', user.uid), { role: 'admin' }, { merge: true });
                } else {
                    state.isAdmin = false;
                }
            } else {
                authBtn.innerText = 'Login';
                state.isAdmin = false;
                state.isEditMode = false;
            }
            updateAdminUI();
            render();
        });

        function updateAdminUI() {
            if (state.isAdmin) {
                editToggleContainer.classList.remove('hidden');
                addWorkContainer.classList.remove('hidden');
                addArtistContainer.classList.remove('hidden');
            } else {
                editToggleContainer.classList.add('hidden');
                addWorkContainer.classList.add('hidden');
                addArtistContainer.classList.add('hidden');
            }
        }

        editToggle.onclick = () => {
            state.isEditMode = !state.isEditMode;
            editToggle.innerText = state.isEditMode ? 'View Mode' : 'Edit Mode';
            editToggle.classList.toggle('bg-white');
            editToggle.classList.toggle('text-black');
            render();
        };

        // Data Sync
        onSnapshot(query(collection(db, 'works'), orderBy('order', 'desc')), (snap) => {
            state.works = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        onSnapshot(query(collection(db, 'artists'), orderBy('order', 'desc')), (snap) => {
            state.artists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (state.artists.length > 0 && state.activeArtistIndex >= state.artists.length) {
                state.activeArtistIndex = 0;
            }
            render();
        });

        onSnapshot(query(collection(db, 'about'), orderBy('order', 'desc')), (snap) => {
            state.about = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        // Rendering Functions
        function render() {
            renderAbout();
            renderWorks();
            renderArtists();
            lucide.createIcons();
        }

        function renderAbout() {
            aboutContainer.innerHTML = state.about.map(info => `
                <div class="space-y-10 relative group">
                    <div class="absolute -left-6 top-2 w-[2px] h-6 bg-[#F5A623] opacity-0 group-hover:opacity-100 transition-opacity duration-500 hidden md:block"></div>
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-1.5 bg-[#F5A623]"></div>
                        ${state.isEditMode ? `
                            <input class="editable-input text-2xl md:text-3xl font-display uppercase tracking-[0.2em] text-white" 
                                   value="${info.title}" 
                                   onchange="updateAbout('${info.id}', 'title', this.value)">
                        ` : `
                            <h4 class="text-2xl md:text-3xl font-display uppercase tracking-[0.2em] text-white">${info.title}</h4>
                        `}
                    </div>
                    <div class="space-y-8">
                        ${state.isEditMode ? `
                            <textarea class="editable-input text-gray-300 text-lg md:text-xl font-light leading-relaxed tracking-wide border-l border-white/5 pl-6" 
                                      rows="3"
                                      onchange="updateAbout('${info.id}', 'description', this.value)">${info.description}</textarea>
                        ` : `
                            <p class="text-gray-300 text-lg md:text-xl font-light leading-relaxed tracking-wide border-l border-white/5 pl-6">${info.description}</p>
                        `}
                        <div class="relative">
                            ${state.isEditMode ? `
                                <textarea class="editable-input text-white/30 text-xs md:text-sm font-mono uppercase tracking-[0.25em] leading-relaxed max-w-4xl pl-6" 
                                          rows="3"
                                          onchange="updateAbout('${info.id}', 'descriptionEn', this.value)">${info.descriptionEn}</textarea>
                            ` : `
                                <p class="text-white/30 text-xs md:text-sm font-mono uppercase tracking-[0.25em] leading-relaxed max-w-4xl pl-6">${info.descriptionEn}</p>
                            `}
                            <div class="absolute left-0 top-0 w-[1px] h-full bg-gradient-to-b from-[#F5A623]/40 to-transparent"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderWorks() {
            const filtered = state.filter === 'ALL' ? state.works : state.works.filter(w => w.category === state.filter);
            worksGrid.innerHTML = filtered.map(work => `
                <div class="group relative flex flex-col cursor-pointer" onclick="openMedia('${work.id}')">
                    <div class="aspect-[16/9] bg-[#111] overflow-hidden relative mb-6 rounded-lg">
                        ${work.mediaType === 'video' ? `
                            <video src="${work.mediaUrl}" autoPlay muted loop playsInline class="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700"></video>
                        ` : `
                            <img src="${work.mediaUrl}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" referrerPolicy="no-referrer">
                        `}
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 rounded-full border border-white/50 bg-black/50 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-colors z-10 opacity-0 group-hover:opacity-100 backdrop-blur-sm">
                            <i data-lucide="play" class="w-6 h-6 ml-1"></i>
                        </div>
                        ${state.isEditMode ? `
                            <div class="edit-overlay">
                                <button onclick="event.stopPropagation(); deleteWork('${work.id}')" class="p-4 bg-white/10 text-white rounded-full hover:bg-red-500 transition-colors">
                                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="flex flex-col">
                        ${state.isEditMode ? `
                            <div class="flex flex-col gap-2">
                                <div class="flex justify-between items-center border-b border-dotted border-white/20 pb-2">
                                    <input class="editable-input text-[10px] font-mono text-[#F5A623] uppercase tracking-widest w-1/4" value="${work.category || 'FILM'}" onchange="event.stopPropagation(); updateWork('${work.id}', 'category', this.value)">
                                    <input class="editable-input text-[10px] font-mono text-white text-center uppercase tracking-widest w-1/2" value="${work.title}" onchange="event.stopPropagation(); updateWork('${work.id}', 'title', this.value)">
                                    <input class="editable-input text-[10px] font-mono text-white text-right uppercase tracking-widest w-1/4" value="${work.year || '2024'}" onchange="event.stopPropagation(); updateWork('${work.id}', 'year', this.value)">
                                </div>
                                <textarea class="editable-input text-[10px] text-gray-500 font-light mt-2" onchange="event.stopPropagation(); updateWork('${work.id}', 'description', this.value)">${work.description}</textarea>
                            </div>
                        ` : `
                            <div class="flex justify-between items-center border-b border-dotted border-white/30 pb-4 group-hover:border-white/50 transition-colors">
                                <span class="text-[10px] font-mono text-white/50 uppercase tracking-widest w-1/4">${work.category || 'FILM'}</span>
                                <h3 class="text-xs md:text-sm font-mono text-white text-center uppercase tracking-widest w-1/2 line-clamp-1 group-hover:text-[#F5A623] transition-colors">${work.title}</h3>
                                <span class="text-[10px] font-mono text-white/50 text-right uppercase tracking-widest w-1/4">${work.year || '2024'}</span>
                            </div>
                        `}
                    </div>
                </div>
            `).join('');
        }

        function renderArtists() {
            if (state.artists.length === 0) {
                carouselContainer.innerHTML = '<p class="text-gray-500 font-mono">No artists found.</p>';
                activeArtistInfo.innerHTML = '';
                return;
            }

            carouselContainer.innerHTML = state.artists.map((artist, index) => {
                const offset = index - state.activeArtistIndex;
                const absOffset = Math.abs(offset);
                const isActive = offset === 0;

                const scale = isActive ? 1.3 : Math.max(0.7, 1 - absOffset * 0.15);
                const rotateY = offset * -15;
                const rotateZ = offset * 8;
                const x = offset * 140;
                const zIndex = 100 - absOffset;
                const opacity = isActive ? 1 : Math.max(0.3, 1 - absOffset * 0.4);

                return `
                    <div class="artist-card ${isActive ? 'active' : ''}" 
                         style="transform: translateX(${x}px) scale(${scale}) rotateY(${rotateY}deg) rotateZ(${rotateZ}deg); z-index: ${zIndex}; opacity: ${opacity}"
                         onclick="setActiveArtist(${index})">
                        <img src="${artist.avatarUrl}" alt="${artist.name}" referrerPolicy="no-referrer">
                        ${state.isEditMode && isActive ? `
                            <div class="edit-overlay opacity-100">
                                <button onclick="event.stopPropagation(); deleteArtist('${artist.id}')" class="p-4 bg-white/10 text-white rounded-full hover:bg-red-500 transition-colors">
                                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            const active = state.artists[state.activeArtistIndex];
            if (active) {
                activeArtistInfo.innerHTML = `
                    <div class="animate-fade-in">
                        ${state.isEditMode ? `
                            <div class="flex flex-col items-center gap-4">
                                <input class="editable-input text-center text-3xl md:text-4xl font-bold tracking-tight uppercase text-white" value="${active.name}" onchange="updateArtist('${active.id}', 'name', this.value)">
                                <textarea class="editable-input text-center text-sm text-gray-400 font-light leading-relaxed h-32" onchange="updateArtist('${active.id}', 'description', this.value)">${active.description}</textarea>
                            </div>
                        ` : `
                            <h3 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-6 uppercase">${active.name}</h3>
                            <div class="w-12 h-1 bg-[#F5A623] mx-auto mb-8"></div>
                            <p class="text-gray-400 font-light text-sm md:text-base max-w-3xl mx-auto leading-loose">${active.description}</p>
                        `}
                    </div>
                `;
                document.getElementById('artist-bg-blur').innerHTML = `<img src="${active.avatarUrl}" class="w-full h-full object-cover filter blur-[100px] scale-110">`;
            }
        }

        // Global Actions
        window.setActiveArtist = (index) => {
            state.activeArtistIndex = index;
            render();
        };

        window.updateAbout = async (id, field, value) => {
            await setDoc(doc(db, 'about', id), { [field]: value }, { merge: true });
        };

        window.updateWork = async (id, field, value) => {
            await setDoc(doc(db, 'works', id), { [field]: value }, { merge: true });
        };

        window.deleteWork = async (id) => {
            if (confirm('Delete this project?')) {
                await deleteDoc(doc(db, 'works', id));
            }
        };

        window.updateArtist = async (id, field, value) => {
            await setDoc(doc(db, 'artists', id), { [field]: value }, { merge: true });
        };

        window.deleteArtist = async (id) => {
            if (confirm('Delete this artist?')) {
                await deleteDoc(doc(db, 'artists', id));
            }
        };

        window.openMedia = (id) => {
            if (state.isEditMode) return;
            const work = state.works.find(w => w.id === id);
            if (!work) return;
            
            modalContent.innerHTML = `
                ${work.mediaType === 'video' ? `
                    <video src="${work.mediaUrl}" controls autoPlay class="w-full max-h-[75vh] object-contain bg-[#111]"></video>
                ` : `
                    <img src="${work.mediaUrl}" class="w-full max-h-[75vh] object-contain bg-[#111]" referrerPolicy="no-referrer">
                `}
                <div class="w-full mt-6 text-left">
                    <h3 class="text-white text-2xl font-bold uppercase tracking-tight">${work.title}</h3>
                    <p class="text-gray-400 text-sm font-light mt-2 max-w-2xl">${work.description}</p>
                </div>
            `;
            mediaModal.classList.remove('hidden');
            mediaModal.classList.add('flex');
        };

        closeModal.onclick = () => {
            mediaModal.classList.add('hidden');
            mediaModal.classList.remove('flex');
            modalContent.innerHTML = '';
        };

        // Add Buttons
        document.getElementById('add-work-btn').onclick = async () => {
            const id = Date.now().toString();
            await setDoc(doc(db, 'works', id), {
                id,
                title: 'NEW PROJECT',
                description: 'Description here...',
                category: 'FILM',
                year: '2024',
                mediaUrl: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop',
                mediaType: 'image',
                createdAt: new Date().toISOString(),
                order: state.works.length > 0 ? Math.max(...state.works.map(w => w.order || 0)) + 1 : 1
            });
        };

        document.getElementById('add-artist-btn').onclick = async () => {
            const id = Date.now().toString();
            await setDoc(doc(db, 'artists', id), {
                id,
                name: 'NEW ARTIST',
                description: 'Artist description...',
                avatarUrl: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=800&auto=format&fit=crop',
                createdAt: new Date().toISOString(),
                order: state.artists.length > 0 ? Math.max(...state.artists.map(a => a.order || 0)) + 1 : 1
            });
        };

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                state.filter = btn.getAttribute('data-filter');
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-[#F5A623]', 'border-[#F5A623]', 'text-black');
                    b.classList.add('border-white/20', 'text-white/50');
                });
                btn.classList.add('bg-[#F5A623]', 'border-[#F5A623]', 'text-black');
                btn.classList.remove('border-white/20', 'text-white/50');
                renderWorks();
            };
        });

        // Initial Render
        render();

    </script>
</body>
</html>
